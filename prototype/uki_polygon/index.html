<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Daphne Fishing Uki Polygon Prototype</title>
<link rel="stylesheet" href="style.css?v=20260705-scale-presets1">
</head>
<body>
<main class="prototypeShell">
  <section class="viewerPanel" aria-label="Uki polygon prototype">
    <div class="gameBackdrop" aria-hidden="true">
      <div class="bgBack"></div>
      <div class="bgTree"></div>
      <div class="waterScroll"></div>
      <div class="sceneShade"></div>
    </div>
    <canvas id="ukiCanvas"></canvas>
    <div class="hud">
      <h1>Uki Polygon Prototype</h1>
      <p id="stateLabel">通常状態</p>
      <p id="loadStatus" class="loadStatus">Three.js 読み込み中...</p>
    </div>
    <label class="scaleControl">
      <span>ウキサイズ <strong id="scaleValue">55%</strong></span>
      <input id="ukiScaleSlider" type="range" min="35" max="120" step="1" value="55">
    </label>
    <div class="scalePresetBar" aria-label="ウキサイズプリセット">
      <button type="button" data-scale-preset="35">MIN</button>
      <button type="button" data-scale-preset="50">50%</button>
      <button type="button" data-scale-preset="100">100%</button>
      <button type="button" data-scale-preset="120">MAX</button>
    </div>
    <button id="toggleStateButton" class="toggleStateButton" type="button">アタリ切替</button>
  </section>
</main>
<script type="module" src="ukiPrototype.js?v=20260705-scale-presets1"></script>
</body>
</html>
