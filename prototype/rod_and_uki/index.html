<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Daphne Fishing Rod and Uki Prototype</title>
<link rel="stylesheet" href="style.css?v=20260706-rod-uki1">
</head>
<body>
<main class="prototypeShell">
  <section id="viewerPanel" class="viewerPanel" aria-label="Rod and polygon uki prototype">
    <div class="gameBackdrop" aria-hidden="true">
      <div class="bgBack"></div>
      <div class="bgTree"></div>
      <div class="waterScroll"></div>
      <div class="sceneShade"></div>
    </div>

    <canvas id="lineCanvas" class="lineCanvas"></canvas>
    <img id="rodImage" class="rodImage" src="../../images/tsurizao.png" alt="rod" draggable="false">

    <div id="ukiStage" class="ukiStage" aria-hidden="true">
      <canvas id="ukiCanvas"></canvas>
    </div>

    <div class="hud">
      <h1>Rod + Polygon Uki</h1>
      <p id="stateLabel">通常状態</p>
      <p id="loadStatus" class="loadStatus">Three.js 読み込み中...</p>
    </div>

    <button id="castButton" class="castButton" type="button" aria-label="Cast">
      <img src="../images/cast_button.png" alt="">
    </button>

    <div id="reelZone" class="reelZone" aria-label="Reel">
      <div class="reelUnit">
        <img class="reelImg" src="../images/reel.png" alt="">
        <img id="handleImg" class="handleImg" src="../images/handle.png" alt="">
      </div>
    </div>

    <div class="controlPanel" aria-label="検証設定">
      <div class="buttonRow">
        <button id="modeButton" type="button">リール表示</button>
        <button id="biteButton" type="button">アタリ切替</button>
      </div>
      <label class="controlRow">
        <span>竿角度 <strong id="aimValue">50%</strong></span>
        <input id="aimSlider" type="range" min="0" max="100" step="1" value="50">
      </label>
      <label class="controlRow">
        <span>投げ先 <strong id="distanceValue">62%</strong></span>
        <input id="distanceSlider" type="range" min="0" max="100" step="1" value="62">
      </label>
      <label class="controlRow">
        <span>ウキサイズ <strong id="scaleValue">42%</strong></span>
        <input id="scaleSlider" type="range" min="25" max="120" step="1" value="42">
      </label>
    </div>
  </section>
</main>
<script type="module" src="rodAndUkiPrototype.js?v=20260706-rod-uki1"></script>
</body>
</html>
